<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>หน้าแรก - Lost & Found</title>
    <link rel="stylesheet" href="Frontend/css/lost.css" />
    <link rel="stylesheet" href="Frontend/css/pdpa.css" />

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #bc3030;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        text-align: center;
        background: #fff;
        border-radius: 12px;
        padding: 40px 20px;
        box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
        width: 90%;
        max-width: 500px;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 10px;
        font-size: 24px;
      }

      p {
        color: #555;
        margin-bottom: 30px;
        font-size: 16px;
      }

      .menu-btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        font-size: 18px;
        font-weight: bold;
        color: black;
        background-color: #ffd13f;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background-color 0.2s,
          transform 0.1s;
        box-sizing: border-box;
      }

      .menu-btn:hover {
        background-color: #da8012;
        transform: scale(1.03);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ยินดีต้อนรับสู่ระบบ Lost & Found</h1>
      <p>เลือกหน้าที่ต้องการ:</p>

      <button class="menu-btn" onclick="location.href = 'Frontend/lost.html'">
        📝 แจ้งของหาย
      </button>
      <button class="menu-btn" onclick="location.href = 'Frontend/found.html'">
        📦 แจ้งพบของ
      </button>
      <button class="menu-btn" onclick="location.href = 'Frontend/search.html'">
        💡 ค้นหาของ
      </button>
      <button class="menu-btn" onclick="location.href = 'Frontend/admin.html'">
        ✨ ผู้ดูแลระบบ
      </button>
    </div>
  </body>
</html>
