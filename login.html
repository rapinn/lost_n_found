<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - TU Secure Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-container { background: #fff; width: 100%; max-width: 400px; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .logo-box { width: 60px; height: 60px; background: #bc3030; color: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; }
        h1 { font-size: 22px; color: #1e293b; margin-bottom: 5px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: #bc3030; box-shadow: 0 0 0 3px rgba(188, 48, 48, 0.1); }
        .btn-login { width: 100%; background: #bc3030; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #9e2828; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(188, 48, 48, 0.2); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-box"><i class="fa-solid fa-shield-halved"></i></div>
        <h1>TU Secure Center</h1>
        <p>ระบบจัดการสิ่งของสูญหาย มธ. ศูนย์รังสิต</p>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>รหัสพนักงาน / ชื่อผู้ใช้</label>
                <input type="text" class="form-control" id="username" placeholder="พิมพ์ admin" required>
            </div>
            <div class="form-group">
                <label>รหัสผ่าน</label>
                <input type="password" class="form-control" id="password" placeholder="พิมพ์ 1234" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        // ระบบ Login จำลอง
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...';
            
            setTimeout(() => {
                // สร้างข้อมูลผู้ใช้จำลอง บันทึกลง localStorage
                const mockUser = {
                    firstName: "สมชาย",
                    lastName: "ใจดี",
                    role: "Administrator",
                    email: "somchai.admin@tu.ac.th",
                    phone: "089-123-4567",
                    avatar: "https://ui-avatars.com/api/?name=Somchai+Jaidee&background=bc3030&color=fff"
                };
                localStorage.setItem('tu_secure_user', JSON.stringify(mockUser));
                
                // ย้ายไปหน้า Dashboard
                window.location.href = 'dashboard.html';
            }, 1000);
        }

        // ถ้า Login แล้วให้ข้ามหน้านี้ไปเลย
        if(localStorage.getItem('tu_secure_user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
