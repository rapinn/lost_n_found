<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แจ้งเรื่องพบของ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #bc3030;
      color: #333;
    }

    form {
      max-width: 600px;
      margin: 0 auto;
      padding: 25px;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    p.intro {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: #ffd13f;
      color: black;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #da8012;
    }

    /* Normalize date/time inputs on iPhone (same height as other inputs) */
    input[type="date"], input[type="time"] {
      -webkit-appearance: none;
      appearance: none;
      height: 44px;
      padding: 10px 12px;
      font-size: 16px;
      line-height: 1.2;
    }
    /* Improve rendering of iOS value area */
    input[type="date"]::-webkit-date-and-time-value,
    input[type="time"]::-webkit-date-and-time-value {
      text-align: left;
    }
  </style>
</head>
<body>

  <form id="foundForm">
    <h1>📦 แจ้งเรื่องพบของ</h1>
    <p class="intro">กรุณากรอกข้อมูลของที่คุณพบ เพื่อให้เจ้าของสามารถติดต่อกลับได้ค่ะ</p>

    <div class="form-group">
      <label for="category">หมวดหมู่</label>
      <select id="category" name="category" required onchange="toggleOtherCategory()">
        <option value="">-- เลือกหมวดหมู่ --</option>
        <option>บัตร</option>
        <option>โทรศัพท์</option>
        <option>อุปกรณ์อิเล็กทรอนิกส์</option>
        <option>เครื่องเขียน</option>
        <option value="other">อื่น ๆ</option>
      </select>
    </div>


    <div class="form-group" id="otherCategoryGroup" style="display:none;">
      <label for="otherCategory">ระบุหมวดหมู่สิ่งของ</label>
      <input type="text" id="otherCategory" placeholder="เช่น กระเป๋า, เสื้อผ้า">
    </div>

    <div class="form-group">
      <label for="brand">ยี่ห้อ / หมายเลขบัตร (ถ้ามี)</label>
      <input type="text" id="brand" name="brand" placeholder="เช่น Student ID 6612345678">
    </div>

    <div class="form-group">
      <label for="details">รายละเอียดเพิ่มเติม</label>
      <textarea id="details" name="details" rows="4" placeholder="เช่น เจอหูฟังสีดำ หน้าห้องสมุดชั้น 2" required></textarea>
    </div>

    <div class="form-group">
      <label for="location">สถานที่ที่พบ</label>
      <input type="text" id="location" name="location" placeholder="เช่น อาคาร บร3" required>
    </div>


    <div class="form-group">
      <label for="date">วันที่ที่พบ</label>
      <input type="date" id="date" name="date" required>
    </div>

    <div class="form-group">
      <label for="time">เวลาที่พบ</label>
      <input type="time" id="time" name="time" required>
    </div>

    <div class="form-group">
      <label for="itemImage">แนบรูปภาพ (ถ้ามี)</label>
      <input type="file" id="itemImage" name="itemImage" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp">
    </div>


    <div class="form-group">
      <label for="reporterName">ชื่อผู้แจ้ง</label>
      <input type="text" id="reporterName" placeholder="ชื่อ-สกุล" required>
    </div>
    <div class="form-group">
      <label for="reporterPhone">เบอร์โทรผู้แจ้ง</label>
      <input 
        type="tel" 
        id="reporterPhone" 
        placeholder="เช่น 0812345678" 
        inputmode="numeric"
        maxlength="10"
        pattern="[0-9]{10}"
        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10);"
        required>
    </div>
    <div class="form-group">
      <label for="reporterStudentId">เลขนักศึกษาผู้แจ้ง</label>
      <input
        type="text"
        id="reporterStudentId"
        placeholder="เช่น 6612345678"
        inputmode="numeric"
        maxlength="10"
        pattern="[0-9]{10}"
        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10);"
        required
      >
    </div>

    <button type="button" id="submitBtn">ส่งข้อมูลพบของหาย</button>
    <p id="status" style="text-align:center;margin-top:10px;"></p>
  </form>

  <script src="liff.js"></script>
<script>
    const LAMBDA_FOUND_URL = "https://pg64fx4orrlpqeczch4r2r4o4y0bbllg.lambda-url.us-east-1.on.aws/";
    const LIFF_ID = "2008305063-P2NpboxX";

    // แสดง/ซ่อนช่องกรอกหมวดหมู่เอง
    function toggleOtherCategory() {
        const category = document.getElementById('category').value;
        const otherGroup = document.getElementById('otherCategoryGroup');
        if (category === 'other') {
            otherGroup.style.display = 'block';
            document.getElementById('otherCategory').required = true;
        } else {
            otherGroup.style.display = 'none';
            document.getElementById('otherCategory').required = false;
            document.getElementById('otherCategory').value = '';
        }
    }

    // UI helpers
    function showStatus(msg, type = 'info') {
        const el = document.getElementById('status');
        if (el) {
            el.textContent = msg;
            el.style.color = type === 'error' ? '#b91c1c' : type === 'success' ? '#166534' : '#374151';
        }
    }

    function setSubmitting(disabled) {
        const btn = document.getElementById('submitBtn');
        if (btn) {
            btn.disabled = disabled;
            btn.style.opacity = disabled ? '0.6' : '1';
            btn.textContent = disabled ? 'กำลังส่ง...' : 'ส่งข้อมูลพบของหาย';
        }
    }

    // ✅ ฟังก์ชันแปลงรูปเป็น Base64 (แบบถูกต้อง)
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            if (!file) return resolve('');
            const reader = new FileReader();
            reader.onload = () => {
                // ตัดส่วน "data:image/jpeg;base64," ออก
                const base64 = reader.result.split(',')[1];
                resolve(base64 || '');
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    let liffProfile = null;
    async function initLiffSafe() {
        try {
            await liff.init({ liffId: LIFF_ID });
            console.log("✅ LIFF initialized");
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        } catch (e) {
            console.warn('LIFF init skipped:', e);
        }
    }

    // ✅ ฟังก์ชันส่งข้อมูลไป Lambda (แก้แล้ว)
    async function sendToLambda(data) {
        let imageUrl = null;

        // ✅ STEP 1: Upload รูปภาพก่อน (ถ้ามี)
        if (data.itemImage) {
            try {
                console.log('📤 Uploading image...');
                const uploadPayload = {
                    action: "upload_image",
                    image_data: data.itemImage,  // ส่ง Base64 โดยตรง (ไม่มี header)
                    image_name: `found_${Date.now()}.jpg`,
                    folder: "found"
                };

                const uploadResponse = await fetch(LAMBDA_FOUND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(uploadPayload)
                });

                const uploadResult = await uploadResponse.json();
                console.log('📥 Upload response:', uploadResult);

                if (uploadResult.status === "success") {
                    imageUrl = uploadResult.image_url;
                    console.log('✅ Image uploaded:', imageUrl);
                } else {
                    console.warn('⚠️ Image upload failed:', uploadResult.error);
                }
            } catch (err) {
                console.error('❌ Image upload error:', err);
            }
        }

        // ✅ STEP 2: ส่งข้อมูลหลัก
        const reportPayload = {
            action: "report_found",
            item_type: "FOUND",
            category: data.category,
            brand: data.brand || "-",
            details: data.details,
            location: data.location,
            date: data.date,
            time: data.time,
            reporter_name: data.reporterName,
            reporter_contact: data.reporterPhone,
            reporter_student_id: data.reporterStudentId
        };

        if (imageUrl) {
            reportPayload.image_url = imageUrl;
        }

        console.log('📤 Sending report:', reportPayload);

        const response = await fetch(LAMBDA_FOUND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(reportPayload)
        });

        if (!response.ok) {
            const errorBody = await response.json().catch(() => ({ error: "Unknown error" }));
            throw new Error(errorBody.error || `HTTP Error ${response.status}`);
        }

        const result = await response.json();
        console.log('✅ Report response:', result);
        return result;
    }

    async function handleSubmit() {
        setSubmitting(true);
        showStatus('กำลังส่ง...', 'info');

        let category = document.getElementById("category").value;
        
        // ถ้าเลือก "อื่น ๆ" ให้ใช้ค่าที่กรอกเอง
        if (category === 'other') {
            const otherCat = document.getElementById("otherCategory").value.trim();
            if (!otherCat) {
                showStatus('❌ กรุณาระบุหมวดหมู่', 'error');
                setSubmitting(false);
                return;
            }
            category = otherCat;
        }

        const brand = document.getElementById("brand").value.trim();
        const details = document.getElementById("details").value.trim();
        const location = document.getElementById("location").value.trim();
        const date = document.getElementById("date").value;
        const time = document.getElementById("time").value;
        const reporterName = document.getElementById("reporterName").value.trim();
        const reporterPhone = document.getElementById("reporterPhone").value.trim();
        const reporterStudentId = document.getElementById("reporterStudentId").value.trim();

        // Validate
        if (!category || !details || !location || !date || !time || !reporterName || !reporterPhone || !reporterStudentId) {
            showStatus('❌ กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
            setSubmitting(false);
            return;
        }

        if (!/^\d{10}$/.test(reporterPhone)) {
            showStatus('❌ เบอร์โทรต้องเป็นตัวเลข 10 หลัก', 'error');
            setSubmitting(false);
            return;
        }

        if (!/^\d{10}$/.test(reporterStudentId)) {
            showStatus('❌ รหัสนักศึกษาต้องเป็นตัวเลข 10 หลัก', 'error');
            setSubmitting(false);
            return;
        }

        // ✅ Process Image (แปลงเป็น Base64)
        const file = document.getElementById("itemImage").files?.[0] || null;
        let itemImage = '';
        
        if (file) {
            try {
                console.log('📷 Processing image:', file.name, file.size, 'bytes');
                itemImage = await fileToBase64(file);
                console.log('✅ Image converted to Base64, length:', itemImage.length);
                
                // ถ้ารูปใหญ่เกินไป (> 6 MB in base64) ให้ข้าม
                if (itemImage.length > 6_000_000) {
                    console.warn('⚠️ Image too large, skipping');
                    itemImage = '';
                    showStatus('รูปภาพใหญ่เกินไป จะส่งข้อมูลโดยไม่แนบรูป', 'info');
                }
            } catch (e) {
                console.error("❌ Could not process image", e);
                itemImage = '';
            }
        }

        const data = {
            category,
            brand,
            details,
            location,
            date,
            time,
            reporterName,
            reporterPhone,
            reporterStudentId,
            itemImage,
        };

        // ส่งข้อมูลไป Lambda
        try {
            showStatus('กำลังบันทึกข้อมูล...', 'info');
            const result = await sendToLambda(data);

            if (result.status === 'success') {
                showStatus(`✅ ส่งข้อมูลพบของเรียบร้อย!\n\nCase ID: ${result.case_id || 'N/A'}`, 'success');

                // ล้างฟอร์ม
                document.getElementById("category").value = "";
                document.getElementById("otherCategory").value = "";
                const otherGroup = document.getElementById("otherCategoryGroup");
                if (otherGroup) otherGroup.style.display = "none";
                document.getElementById("brand").value = "";
                document.getElementById("details").value = "";
                document.getElementById("location").value = "";
                document.getElementById("date").value = "";
                document.getElementById("time").value = "";
                document.getElementById("reporterName").value = "";
                document.getElementById("reporterPhone").value = "";
                document.getElementById("reporterStudentId").value = "";
                document.getElementById("itemImage").value = "";

                // ปิด LIFF (ถ้าอยู่ใน LINE)
                if (typeof liff !== 'undefined' && liff.isInClient()) {
                    setTimeout(() => liff.closeWindow(), 2000);
                }
            } else {
                showStatus(`❌ เกิดข้อผิดพลาด: ${result.error || 'Unknown error'}`, 'error');
            }
        } catch (error) {
            console.error('❌ Submit failed:', error);
            showStatus(`❌ ส่งข้อมูลไม่สำเร็จ: ${error.message}`, 'error');
        } finally {
            setSubmitting(false);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initLiffSafe();
        
        const submitBtn = document.getElementById("submitBtn");
        if (submitBtn) {
            submitBtn.addEventListener("click", handleSubmit);
        }
        
        const categorySelect = document.getElementById("category");
        if (categorySelect) {
            categorySelect.addEventListener("change", toggleOtherCategory);
        }
    });
</script>
</body>
</html>
