<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งเรื่องของหาย</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #bc3030;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 25px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        p.intro {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ffd13f;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #da8012;
        }
        #status {
            text-align: center;
            margin-top: 10px;
        }

        
        input[type="date"], input[type="time"] {
          -webkit-appearance: none;
          appearance: none;
          height: 44px;
          padding: 10px 12px;
          font-size: 16px;
          line-height: 1.2;
        }
        input[type="date"]::-webkit-date-and-time-value,
        input[type="time"]::-webkit-date-and-time-value {
          text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section" id="reportSection">
            <h1>📝 แบบฟอร์มแจ้งของหาย</h1>
            <p class="intro">กรุณากรอกข้อมูลให้ครบถ้วนที่สุด<br>เพื่อให้เจ้าหน้าที่ติดตามของให้คุณได้ง่ายขึ้นนะคะ</p>

            <div class="form-group">
                <label for="itemName">สิ่งของที่คุณทำหายคืออะไร ?</label>
                <input type="text" id="itemName" name="itemName" placeholder="เช่น กระเป๋าสตางค์, โทรศัพท์, บัตรนักศึกษา" required>
            </div>
            <div class="form-group">
                <label for="brand">ยี่ห้อ / หมายเลขบัตร (ถ้ามี)</label>
                <input type="text" id="brand" name="brand" placeholder="เช่น Samsung, 1234-5678-xxxx">
            </div>
            <div class="form-group">
                <label for="description">ลักษณะเด่น (สี, รุ่น, ตำหนิ)</label>
                <textarea id="description" name="description" rows="4" placeholder="เช่น โทรศัพท์สีฟ้า มีรอยขีดด้านหลัง, บัตรมีพวงกุญแจตุ๊กตา" required></textarea>
            </div>
            <div class="form-group">
                <label for="location">สถานที่ที่คาดว่าทำหาย</label>
                <input type="text" id="location" name="location" placeholder="เช่น ห้องเรียน, โรงอาหาร, ลานจอดรถ, ชั้น 3 หอสมุดป๋วย" required>
            </div>

            <!-- ✅ แยกช่องวันที่และเวลา -->
            <div class="form-group">
                <label for="date">วันที่ที่คาดว่าทำหาย</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="time">เวลาที่คาดว่าทำหาย</label>
                <input type="time" id="time" name="time" required>
            </div>

            <!-- ✅ แนบรูปภาพ -->
            <div class="form-group">
                <label for="itemImage">แนบรูปภาพ (ถ้ามี)</label>
                <input type="file" id="itemImage" name="itemImage" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp">
            </div>

            <!-- ช่องทางติดต่อผู้แจ้ง -->
            <div class="form-group">
                <label for="reporterName">ชื่อผู้แจ้ง</label>
                <input type="text" id="reporterName" placeholder="ชื่อ-สกุล" required>
            </div>
            <div class="form-group">
                <label for="reporterPhone">เบอร์โทรผู้แจ้ง</label>
                <input 
                  type="tel" 
                  id="reporterPhone" 
                  placeholder="เช่น 0812345678" 
                  inputmode="numeric"
                  maxlength="10"
                  pattern="[0-9]{10}"
                  oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10);"
                  required>
            </div>
            <div class="form-group">
                <label for="reporterStudentId">เลขนักศึกษาผู้แจ้ง</label>
                <input
                  type="text"
                  id="reporterStudentId"
                  placeholder="เช่น 6612345678"
                  inputmode="numeric"
                  maxlength="10"
                  pattern="[0-9]{10}"
                  oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10);"
                  required
                >
            </div>

            <button id="reportBtn">ส่งข้อมูลแจ้งของหาย</button>
            <p id="status"></p>
        </div>
    </div>

<script src="liff.js"></script>
<script>
  // ⭐️ 1. URL ของ Lambda "แจ้งของหาย" (Lost)
  const LAMBDA_LOST_URL = "https://sv7tbffuhi5tdtqix5a3lanp740xxggi.lambda-url.us-east-1.on.aws/";
  const LIFF_ID = "2008305063-P2NpboxX";

  function showStatus(msg, type = 'info') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.style.color = type === 'error' ? '#b91c1c' : type === 'success' ? '#166534' : '#374151';
  }
  function setSubmitting(disabled) {
    const btn = document.getElementById('reportBtn');
    btn.disabled = disabled;
    btn.style.opacity = disabled ? '0.6' : '1';
    btn.textContent = disabled ? 'กำลังส่ง...' : 'ส่งข้อมูลแจ้งของหาย';
  }


  function readFileAsDataURL(file) {
    return new Promise((resolve) => {
      if (!file) return resolve('');
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result || '');
      reader.onerror = () => resolve('');
      reader.readAsDataURL(file);
    });
  }
  function compressImage(file, maxW = 1024, maxH = 1024, quality = 0.7) {
    return new Promise((resolve) => {
      if (!file) return resolve('');
      const img = new Image();
      const fr = new FileReader();
      fr.onload = () => { img.src = fr.result; };
      fr.onerror = () => resolve('');
      img.onload = () => {
        let { width, height } = img;
        const ratio = Math.min(maxW / width, maxH / height, 1);
        const w = Math.round(width * ratio);
        const h = Math.round(height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        try {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl || '');
        } catch {
          resolve('');
        }
      };
      img.onerror = () => resolve('');
      fr.readAsDataURL(file);
    });
  }

  let liffProfile = null;
  async function initLiffSafe() {
    try { 
      // (สันนิษฐานว่า liff.js มีฟังก์ชัน initializeLiff)
      // liffProfile = await initializeLiff(LIFF_ID); 
    }
    catch (e) { console.warn('LIFF init skipped:', e); }
  }


  // ⭐️ 2. ฟังก์ชันสำหรับส่งข้อมูลไป Lambda (ตัวเดียว)
  // (ลบ sendToGoogleSheet ทิ้ง)
  async function sendToLambda(data) {
      // "แมป" (map) ข้อมูลจากฟอร์ม ให้ตรงกับที่ Lambda คาดหวัง
      const lambdaPayload = {
          itemDescription: data.itemName,// (ฟอร์มใช้ itemName)
          brandOrId: data.brand,
          distinguishingFeatures: data.description,
          lostLocation: data.location,
          lostDate: data.date,
          lostTime: data.time,
          imageBase64: data.itemImage || "",
          reporterName: data.reporterName,
          reporterContact: data.reporterPhone,
          reporterStudentId: data.reporterStudentId
      };


      const response = await fetch(LAMBDA_LOST_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(lambdaPayload)
      });


      if (!response.ok) {
          const errorBody = await response.json().catch(() => ({ error: "Unknown error from Lambda" }));
          throw new Error(errorBody.error || `HTTP Error ${response.status}`);
      }
      
      const result = await response.json();
      console.log('✅ Sent to Lambda (Lost), got response:', result);
      return result; 
  }

  // ⭐️ 3. แก้ไข handleSubmit (ตัวหลัก)
  document.getElementById("reportBtn").addEventListener("click", async function () {
    setSubmitting(true);
    showStatus('กำลังส่ง...', 'info');


    const itemName = document.getElementById("itemName").value.trim();
    const brand = document.getElementById("brand").value.trim();
    const description = document.getElementById("description").value.trim();
    const location = document.getElementById("location").value.trim();
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const reporterName = document.getElementById("reporterName").value.trim();
    const reporterPhone = document.getElementById("reporterPhone").value.trim();
    const reporterStudentId = document.getElementById("reporterStudentId").value.trim();

    // Validate (เหมือนเดิม)
    if (!itemName || !description || !location || !date || !time || !reporterName || !reporterPhone || !reporterStudentId) {
      showStatus('❌ กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
      setSubmitting(false);
      return;
    }
    if (reporterPhone.length !== 10 || !/^\d{10}$/.test(reporterPhone)) {
      showStatus('❌ เบอร์โทรต้องเป็นตัวเลข 10 หลัก', 'error');
      setSubmitting(false);
      return;
    }
    if (reporterStudentId.length !== 10 || !/^\d{10}$/.test(reporterStudentId)) {
      showStatus('❌ รหัสนักศึกษาต้องเป็นตัวเลข 10 หลัก', 'error');
      setSubmitting(false);
      return;
    }


    // Process Image (เหมือนเดิม)
    const file = document.getElementById("itemImage").files?.[0] || null;
    let itemImage = '';
    try {
      itemImage = await compressImage(file);
      if (!itemImage && file) itemImage = await readFileAsDataURL(file);
      if (itemImage && itemImage.length > 3_500_000) {
        itemImage = '';
        showStatus('รูปภาพใหญ่เกินไป จะส่งข้อมูลโดยไม่แนบรูป', 'info');
      }
    } catch (e) {
      console.warn("Could not process image", e);
      itemImage = '';
    }


    const data = {
      itemName, brand, description, location, date, time,
      reporterName, reporterPhone, reporterStudentId,
      itemImage,
    };


    // ⭐️ 5. ส่งข้อมูลไป AWS ที่เดียว
    try {
      showStatus('กำลังเชื่อมต่อฐานข้อมูล AWS...', 'info');
      const lambdaResult = await sendToLambda(data);


      showStatus(`✅ ส่งข้อมูลแจ้งของหายเรียบร้อย! (Case ID: ${lambdaResult.caseId || 'N/A'})`, 'success');
      
      // ล้างฟอร์ม
      document.getElementById("itemName").value = "";
      document.getElementById("brand").value = "";
      document.getElementById("description").value = "";
      document.getElementById("location").value = "";
      document.getElementById("date").value = "";
      document.getElementById("time").value = "";
      document.getElementById("reporterName").value = "";
      document.getElementById("reporterPhone").value = "";
      document.getElementById("reporterStudentId").value = "";
      document.getElementById("itemImage").value = "";
      
    } catch (error) {
      console.error('Submit failed:', error);
      showStatus(`❌ ส่งข้อมูลไม่สำเร็จ: ${error.message}`, 'error');
    } finally {
      setSubmitting(false);
    }
  });
  
  document.addEventListener('DOMContentLoaded', () => {
    initLiffSafe();
    // (Event Listener ถูกย้ายไปอยู่ข้างบนแล้ว)
  });
</script>
</body>
</html>
